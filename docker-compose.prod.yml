# Diet Planner - Production Docker Compose
# For deployment on Hetzner VPS (behind FastPanel nginx)
# Images are pre-built and pulled from GHCR

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: diet_planner_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_MULTIPLE_DATABASES: langfuse
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (Celery Broker)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: diet_planner_redis
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Qdrant Vector Database
  # ============================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: diet_planner_qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
      - /etc/localtime:/etc/localtime:ro
    environment:
      QDRANT__LOG_LEVEL: INFO
      TZ: ${TZ}

  # ============================================
  # FastAPI Backend (pre-built from GHCR)
  # ============================================
  backend:
    image: ghcr.io/aimaven-tech/fittrack/backend:latest
    container_name: diet_planner_backend
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
      - ./backend/app/services/llm_service.py:/app/app/services/llm_service.py:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:120b-cloud}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TZ: ${TZ}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama:
        condition: service_started

  # ============================================
  # Celery Worker with Beat Scheduler
  # ============================================
  celery:
    image: ghcr.io/aimaven-tech/fittrack/backend:latest
    container_name: diet_planner_celery
    restart: unless-stopped
    user: root
    command: celery -A app.celery_app worker --beat --loglevel=info
    volumes:
      - celery_data:/app/celery_beat_data
      - ./backend/app/services/llm_service.py:/app/app/services/llm_service.py:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:120b-cloud}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      TZ: ${TZ}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================
  # Langfuse (Self-hosted LLM Observability)
  # ============================================
  langfuse:
    image: langfuse/langfuse:3
    container_name: diet_planner_langfuse
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      NEXTAUTH_URL: https://${LANGFUSE_DOMAIN:-langfuse.${DOMAIN}}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-langfuse}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      TZ: ${TZ}
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_started

  # ============================================
  # MinIO (S3-compatible storage for Langfuse v3)
  # ============================================
  langfuse-minio:
    image: minio/minio:latest
    container_name: diet_planner_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: ${TZ}
    volumes:
      - minio_data:/data
      - /etc/localtime:/etc/localtime:ro

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: diet_planner_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:-langfuse}
      TZ: ${TZ}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Ollama LLM Server
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: diet_planner_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
      - /etc/localtime:/etc/localtime:ro
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      TZ: ${TZ}
    # Uncomment below to use NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ============================================
  # React Frontend (pre-built from GHCR, nginx)
  # Exposed on port 8080 — FastPanel nginx proxies to this
  # ============================================
  frontend:
    image: ghcr.io/aimaven-tech/fittrack/frontend:latest
    container_name: diet_planner_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: ${TZ}
    depends_on:
      - backend

# ============================================
# Persistent Volumes
# ============================================
volumes:
  postgres_data:
    name: diet_planner_postgres_data
  redis_data:
    name: diet_planner_redis_data
  qdrant_data:
    name: diet_planner_qdrant_data
  celery_data:
    name: diet_planner_celery_data
  uploads_data:
    name: diet_planner_uploads_data
  ollama_data:
    name: diet_planner_ollama_data
  clickhouse_data:
    name: diet_planner_clickhouse_data
  clickhouse_logs:
    name: diet_planner_clickhouse_logs
  minio_data:
    name: diet_planner_minio_data
